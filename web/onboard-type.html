<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Select team member type — Payroll Works</title>
    <link rel="stylesheet" href="employees-theme.css" />
  </head>
  <body class="pe-app">
    <div class="pe-shell">
      <header class="pe-topbar">
        <div class="pe-brand">
          <span>PAYROLL WORKS</span>
          <span class="sep">|</span>
          <span class="sub">Payroll</span>
          <span class="pe-flag">🇨🇦</span>
          <span class="pe-tax-pill">2026</span>
        </div>
        <nav class="pe-topbar-nav">
          <a href="run-payroll.html" class="pe-topbar-nav-item">Payroll</a>
        </nav>
        <div class="pe-topbar-right">
          <span class="pe-badge-admin">Admin</span>
          <span>RORO HOLDING LTD · Dan Luo</span>
          <button type="button" class="pe-icon-btn">📞</button>
          <button type="button" class="pe-icon-btn">🔔</button>
          <button type="button" class="pe-icon-btn">?</button>
          <div class="pe-avatar">LH</div>
        </div>
      </header>

      <div class="pe-wizard-bar">
        <div class="pe-wizard-steps">
          <div class="pe-wstep active">
            <span class="circle">👤</span>
            <span>Employee</span>
          </div>
          <div class="pe-wstep">
            <span class="circle">💵</span>
            <span>Payroll</span>
          </div>
          <div class="pe-wstep">
            <span class="circle">📋</span>
            <span>Checklist</span>
          </div>
        </div>
        <div class="pe-wizard-sub">
          <a class="pe-back" href="employees.html" style="color: #fff; opacity: 0.95">← Employees</a>
          <span>Onboard employee</span>
        </div>
      </div>

      <aside class="pe-sidebar">
        <a class="pe-nav" href="dashboard.html"><span>⌂</span> Home</a>
        <a class="pe-nav" href="run-payroll.html"><span>▤</span> Run payroll</a>
        <a class="pe-nav" href="#"><span>☰</span> Actions</a>
        <a class="pe-nav" href="reports/payrun.html"><span>▦</span> Reports</a>
        <a class="pe-nav active" href="employees.html"><span>👤</span> Employees</a>
        <span class="pe-nav spacer"></span>
        <a class="pe-nav" href="#"><span>⚙</span> Settings</a>
      </aside>

      <main class="pe-main">
        <a class="pe-back" href="employees.html">← Select team member type</a>

        <div class="pe-card">
          <h2>Select team member type</h2>
          <div class="pe-radio-list">
            <label class="pe-radio-card">
              <input type="radio" name="memberType" value="employee" checked />
              <div>
                <strong>Employee</strong>
                <p style="margin: 0.35rem 0 0; color: var(--pe-text-secondary); font-size: 0.88rem">
                  Standard source deductions will be applied. Optional benefits and other deductions can be added in the
                  on-boarding wizard.
                </p>
              </div>
            </label>
            <label class="pe-radio-card">
              <input type="radio" name="memberType" value="contractor" />
              <div>
                <strong>Contractor</strong>
                <p style="margin: 0.35rem 0 0; color: var(--pe-text-secondary); font-size: 0.88rem">
                  No source deductions will be calculated. T4A contractor tax slips will be generated.
                </p>
              </div>
            </label>
            <label class="pe-radio-card">
              <input type="radio" name="memberType" value="construction_contractor" />
              <div>
                <strong>Construction contractor</strong>
                <p style="margin: 0.35rem 0 0; color: var(--pe-text-secondary); font-size: 0.88rem">
                  No source deductions will be calculated. T5018 contractor tax slips will be generated.
                </p>
              </div>
            </label>
          </div>
          <div class="pe-foot-actions">
            <a class="pe-btn" href="employees.html">Cancel</a>
            <button type="button" class="pe-btn pe-btn-primary" id="btn-continue">Continue</button>
          </div>
        </div>
      </main>
    </div>
    <script src="js/onboard.js"></script>
    <script>
      document.getElementById("btn-continue").addEventListener("click", function () {
        var v = document.querySelector('input[name="memberType"]:checked').value;
        var map = { employee: 0, contractor: 1, construction_contractor: 2 };
        pwOnboard.save({ memberType: map[v], memberTypeKey: v });
        location.href = "onboard-setup.html";
      });
    </script>
  </body>
</html>
