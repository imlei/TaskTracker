<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add Team Member — Payroll Works</title>
    <script>(function(){var t=localStorage.getItem('pw-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="/vendor/daisyui-themes.css" rel="stylesheet" />
    <link href="/vendor/daisyui-components.css" rel="stylesheet" />
    <script src="/vendor/tailwind-browser.js"></script>
    <style type="text/tailwindcss">@import "tailwindcss";</style>
  </head>
  <body class="bg-base-200 min-h-screen">

    <!-- Navbar -->
    <div class="navbar bg-base-100 border-b border-base-300 px-4 min-h-12 sticky top-0 z-30 shadow-sm">
      <div class="navbar-start gap-2">
        <a id="backBtn" href="employees.html" class="btn btn-ghost btn-sm btn-circle" title="Back">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <span class="font-bold text-sm tracking-wide">SimpleTask - Payroll</span>
        <span class="text-base">🇨🇦</span>
      </div>
      <div class="navbar-center">
        <span class="text-sm font-medium text-base-content/70">Add Team Member</span>
      </div>
      <div class="navbar-end gap-3">
        <button onclick="toggleTheme()" class="btn btn-ghost btn-sm btn-circle" title="Toggle dark mode">
          <svg id="iconSun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14A7 7 0 0012 5z"/></svg>
          <svg id="iconMoon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <div class="avatar avatar-placeholder">
          <div class="bg-primary text-primary-content rounded-full w-8 text-xs"><span>PW</span></div>
        </div>
      </div>
    </div>

    <!-- Wizard progress bar -->
    <div class="bg-base-100 border-b border-base-300 px-6 py-3">
      <ul class="steps steps-horizontal w-full max-w-lg mx-auto text-xs">
        <li class="step step-primary" data-content="1">Member Type</li>
        <li class="step" data-content="2">Personal Info</li>
        <li class="step" data-content="3">Payroll</li>
        <li class="step" data-content="4">YTD &amp; Benefits</li>
        <li class="step" data-content="5">Review</li>
      </ul>
    </div>

    <div class="flex justify-center px-4 py-8">
      <div class="w-full max-w-2xl">
        <!-- Card -->
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body gap-6">
            <div>
              <h2 class="text-lg font-bold">Select team member type</h2>
              <p class="text-sm text-base-content/60 mt-1">Choose the type that best describes this team member's employment relationship.</p>
            </div>

            <div class="flex flex-col gap-3" id="type-list">
              <label class="flex items-start gap-4 p-4 border-2 border-base-300 rounded-xl cursor-pointer hover:border-primary/40 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                <input type="radio" name="memberType" value="0" class="radio radio-primary mt-0.5" checked />
                <div>
                  <div class="font-semibold">Employee (T4)</div>
                  <p class="text-sm text-base-content/60 mt-1">Standard source deductions apply — CPP, EI, and income tax will be calculated. T4 slips generated at year-end.</p>
                </div>
              </label>
              <label class="flex items-start gap-4 p-4 border-2 border-base-300 rounded-xl cursor-pointer hover:border-primary/40 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                <input type="radio" name="memberType" value="1" class="radio radio-primary mt-0.5" />
                <div>
                  <div class="font-semibold">Contractor (T4A)</div>
                  <p class="text-sm text-base-content/60 mt-1">No source deductions calculated. T4A contractor tax slips will be generated at year-end.</p>
                </div>
              </label>
              <label class="flex items-start gap-4 p-4 border-2 border-base-300 rounded-xl cursor-pointer hover:border-primary/40 transition-colors has-[:checked]:border-primary has-[:checked]:bg-primary/5">
                <input type="radio" name="memberType" value="2" class="radio radio-primary mt-0.5" />
                <div>
                  <div class="font-semibold">Construction Contractor (T5018)</div>
                  <p class="text-sm text-base-content/60 mt-1">No source deductions calculated. T5018 statement of contract payments generated at year-end.</p>
                </div>
              </label>
            </div>

            <!-- Footer actions -->
            <div class="flex justify-between items-center pt-2 border-t border-base-200">
              <a id="cancelBtn" href="employees.html" class="btn btn-ghost btn-sm">Cancel</a>
              <button type="button" id="btn-continue" class="btn btn-primary btn-sm gap-2">
                Continue
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="js/onboard.js"></script>
    <script>
      function toggleTheme() {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('pw-theme', next);
        document.getElementById('iconSun').classList.toggle('hidden', next !== 'dark');
        document.getElementById('iconMoon').classList.toggle('hidden', next === 'dark');
      }
      document.addEventListener('DOMContentLoaded', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.getElementById('iconSun').classList.toggle('hidden', !isDark);
        document.getElementById('iconMoon').classList.toggle('hidden', isDark);
      });

      (function() {
        var companyId = new URLSearchParams(location.search).get('company') || '';
        if (companyId) {
          pwOnboard.save({ companyId: companyId });
          document.getElementById('backBtn').href = 'employees.html?company=' + encodeURIComponent(companyId);
          document.getElementById('cancelBtn').href = 'employees.html?company=' + encodeURIComponent(companyId);
        }

        // Restore previous selection
        var d = pwOnboard.load();
        if (d.memberType !== undefined) {
          var radio = document.querySelector('input[name="memberType"][value="' + d.memberType + '"]');
          if (radio) radio.checked = true;
        }

        document.getElementById('btn-continue').addEventListener('click', function() {
          var val = parseInt(document.querySelector('input[name="memberType"]:checked').value, 10);
          var cid = pwOnboard.load().companyId || companyId;
          pwOnboard.save({ memberType: val, companyId: cid });
          location.href = 'onboard-personal.html';
        });
      })();
    </script>
  </body>
</html>
