<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login — SimpleTask</title>
  <!-- DaisyUI v5 + Tailwind v4 (CDN, replace with bundled build in production) -->
  <link href="/vendor/daisyui-themes.css" rel="stylesheet" />
  <link href="/vendor/daisyui-components.css" rel="stylesheet" />
  <script src="/vendor/tailwind-browser.js"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">

  <div class="card bg-base-100 shadow-2xl w-full max-w-md">
    <div class="card-body p-8 md:p-10">

      <!-- Brand -->
      <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary text-primary-content text-xl font-bold mb-4 select-none">
          ST
        </div>
        <h1 class="text-2xl font-bold text-base-content">Admin Console</h1>
        <p class="text-sm text-base-content/50 mt-1">SimpleTask Management Portal</p>
      </div>

      <!-- Error Alert -->
      <div id="error-alert" class="alert alert-error mb-4 hidden" role="alert">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 shrink-0 stroke-current" fill="none" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span id="error-text"></span>
      </div>

      <!-- Login Form -->
      <form id="login-form" novalidate class="space-y-4">
        <div class="form-control">
          <label class="label pb-1">
            <span class="label-text font-medium">Username</span>
          </label>
          <input id="username" type="text" placeholder="admin"
            class="input input-bordered w-full"
            autocomplete="username" required autofocus />
        </div>

        <div class="form-control">
          <label class="label pb-1">
            <span class="label-text font-medium">Password</span>
          </label>
          <input id="password" type="password" placeholder="••••••••"
            class="input input-bordered w-full"
            autocomplete="current-password" required />
        </div>

        <button type="submit" id="btn-submit" class="btn btn-primary w-full mt-2">
          Sign In
        </button>
      </form>

      <div class="divider text-xs text-base-content/40 my-5">Administrator access only</div>

      <a href="/" class="btn btn-ghost btn-sm w-full text-base-content/40 hover:text-base-content">
        ← Back to Application
      </a>
    </div>
  </div>

  <script src="/admin/admin.js"></script>
</body>
</html>
