<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — SimpleTask</title>
  <!-- DaisyUI v5 + Tailwind v4 (CDN, replace with bundled build in production) -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-base-200 min-h-screen">

  <!-- TailAdmin-inspired drawer layout (sidebar + content) -->
  <div class="drawer lg:drawer-open">
    <input id="sidebar-toggle" type="checkbox" class="drawer-toggle" />

    <!-- ─── Main Content ─────────────────────────────────────────── -->
    <div class="drawer-content flex flex-col min-h-screen">

      <!-- Top Navbar -->
      <header class="sticky top-0 z-30 bg-base-100 border-b border-base-300 px-4 h-16 flex items-center gap-3">
        <!-- Mobile hamburger -->
        <label for="sidebar-toggle" class="btn btn-ghost btn-sm btn-square lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </label>

        <div class="flex-1">
          <h2 class="text-base font-semibold text-base-content">User Management</h2>
        </div>

        <!-- Right side: username + logout -->
        <div class="flex items-center gap-3">
          <div class="hidden sm:flex items-center gap-2">
            <div class="avatar placeholder">
              <div class="bg-primary text-primary-content rounded-full w-8">
                <span id="nav-avatar" class="text-xs font-bold">AD</span>
              </div>
            </div>
            <span id="nav-username" class="text-sm font-medium text-base-content/70"></span>
          </div>
          <button id="btn-logout" class="btn btn-ghost btn-sm">Logout</button>
        </div>
      </header>

      <!-- Page Body -->
      <main class="flex-1 p-4 md:p-6 w-full max-w-6xl mx-auto">

        <!-- Stats Row (HyperUI-inspired stat cards) -->
        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">

          <div class="bg-base-100 rounded-2xl shadow-sm p-5 flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 text-primary shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
              </svg>
            </div>
            <div>
              <p class="text-xs text-base-content/50 uppercase tracking-wide font-medium">Total Users</p>
              <p class="text-3xl font-bold text-base-content mt-0.5" id="stat-total">—</p>
            </div>
          </div>

          <div class="bg-base-100 rounded-2xl shadow-sm p-5 flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-success/10 text-success shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
            </div>
            <div>
              <p class="text-xs text-base-content/50 uppercase tracking-wide font-medium">Level 2 — Full Access</p>
              <p class="text-3xl font-bold text-success mt-0.5" id="stat-user2">—</p>
            </div>
          </div>

          <div class="bg-base-100 rounded-2xl shadow-sm p-5 flex items-center gap-4">
            <div class="flex items-center justify-center w-12 h-12 rounded-xl bg-warning/10 text-warning shrink-0">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
              </svg>
            </div>
            <div>
              <p class="text-xs text-base-content/50 uppercase tracking-wide font-medium">Level 1 — Payroll Only</p>
              <p class="text-3xl font-bold text-warning mt-0.5" id="stat-user1">—</p>
            </div>
          </div>

        </div>

        <!-- Users Table Card -->
        <div class="bg-base-100 rounded-2xl shadow-sm overflow-hidden">
          <div class="flex items-center justify-between px-5 py-4 border-b border-base-200">
            <h3 class="font-semibold text-base-content">All Users</h3>
            <button id="btn-create-user" class="btn btn-primary btn-sm gap-1.5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              New User
            </button>
          </div>

          <div class="overflow-x-auto">
            <table class="table table-zebra w-full">
              <thead>
                <tr class="text-xs uppercase tracking-wider text-base-content/50">
                  <th class="w-12"></th>
                  <th>Username</th>
                  <th>Role</th>
                  <th class="text-right pr-5">Actions</th>
                </tr>
              </thead>
              <tbody id="users-body">
                <tr>
                  <td colspan="4" class="text-center py-12 text-base-content/30">
                    <span class="loading loading-spinner loading-md"></span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div><!-- end drawer-content -->

    <!-- ─── Sidebar ───────────────────────────────────────────────── -->
    <div class="drawer-side z-40">
      <label for="sidebar-toggle" class="drawer-overlay"></label>

      <aside class="w-64 min-h-screen bg-base-100 border-r border-base-300 flex flex-col">

        <!-- Brand -->
        <div class="flex items-center gap-3 px-5 h-16 border-b border-base-300 shrink-0">
          <div class="flex items-center justify-center w-9 h-9 rounded-xl bg-primary text-primary-content font-bold text-sm select-none">
            ST
          </div>
          <div>
            <p class="text-sm font-bold text-base-content leading-tight">SimpleTask</p>
            <p class="text-xs text-base-content/40">Admin Console</p>
          </div>
        </div>

        <!-- Navigation -->
        <nav class="flex-1 px-3 py-5 overflow-y-auto">

          <p class="px-3 mb-2 text-xs font-semibold uppercase tracking-widest text-base-content/35">Management</p>
          <ul class="menu menu-sm p-0 gap-0.5">
            <li>
              <a class="rounded-xl font-medium bg-primary/10 text-primary hover:bg-primary/15 active">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/>
                </svg>
                Users
              </a>
            </li>
          </ul>

          <div class="divider my-3 text-base-content/20"></div>

          <p class="px-3 mb-2 text-xs font-semibold uppercase tracking-widest text-base-content/35">Application</p>
          <ul class="menu menu-sm p-0 gap-0.5">
            <li>
              <a href="/" class="rounded-xl text-base-content/70">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                Main App
              </a>
            </li>
            <li>
              <a href="/payroll/dashboard.html" class="rounded-xl text-base-content/70">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2zm7-5a2 2 0 11-4 0 2 2 0 014 0z"/>
                </svg>
                Payroll
              </a>
            </li>
          </ul>
        </nav>

        <!-- Sidebar Footer: current user info -->
        <div class="px-4 py-4 border-t border-base-300 shrink-0">
          <div class="flex items-center gap-3">
            <div class="avatar placeholder shrink-0">
              <div class="bg-primary/15 text-primary rounded-full w-9">
                <span id="sidebar-avatar" class="text-xs font-bold">AD</span>
              </div>
            </div>
            <div class="min-w-0">
              <p id="sidebar-username" class="text-sm font-semibold text-base-content truncate">Admin</p>
              <p class="text-xs text-base-content/40">Administrator</p>
            </div>
          </div>
        </div>

      </aside>
    </div><!-- end drawer-side -->
  </div><!-- end drawer -->

  <!-- ─── Create User Modal ──────────────────────────────────────── -->
  <dialog id="modal-create" class="modal">
    <div class="modal-box max-w-md">
      <h3 class="font-bold text-lg mb-5">Create New User</h3>

      <form id="form-create" class="space-y-4" novalidate>
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-medium">Username</span></label>
          <input id="new-username" type="text" class="input input-bordered w-full"
            placeholder="e.g. john.doe" autocomplete="off" required />
        </div>

        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-medium">Password</span></label>
          <input id="new-password" type="password" class="input input-bordered w-full"
            placeholder="Min 8 chars" autocomplete="new-password" required />
          <label class="label pt-1">
            <span class="label-text-alt text-base-content/40">Requires uppercase, lowercase, number &amp; symbol</span>
          </label>
        </div>

        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-medium">Role</span></label>
          <select id="new-role" class="select select-bordered w-full">
            <option value="user2">Level 2 — Full Access (all features)</option>
            <option value="user1">Level 1 — Payroll Only</option>
          </select>
        </div>

        <div id="create-error" class="alert alert-error text-sm py-2.5 hidden"></div>

        <div class="modal-action pt-2">
          <button type="submit" class="btn btn-primary">Create User</button>
          <button type="button" id="btn-create-cancel" class="btn btn-ghost">Cancel</button>
        </div>
      </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <!-- ─── Reset Password Modal ───────────────────────────────────── -->
  <dialog id="modal-reset" class="modal">
    <div class="modal-box max-w-md">
      <h3 class="font-bold text-lg mb-1">Reset Password</h3>
      <p class="text-sm text-base-content/50 mb-5">
        User: <strong id="reset-target-name" class="text-base-content font-semibold"></strong>
      </p>

      <form id="form-reset" class="space-y-4" novalidate>
        <div class="form-control">
          <label class="label pb-1"><span class="label-text font-medium">New Password</span></label>
          <input id="reset-new-pwd" type="password" class="input input-bordered w-full"
            placeholder="Min 8 chars" autocomplete="new-password" required />
          <label class="label pt-1">
            <span class="label-text-alt text-base-content/40">Requires uppercase, lowercase, number &amp; symbol</span>
          </label>
        </div>

        <div id="reset-error" class="alert alert-error text-sm py-2.5 hidden"></div>

        <div class="modal-action pt-2">
          <button type="submit" class="btn btn-warning">Reset Password</button>
          <button type="button" id="btn-reset-cancel" class="btn btn-ghost">Cancel</button>
        </div>
      </form>
    </div>
    <form method="dialog" class="modal-backdrop"><button>close</button></form>
  </dialog>

  <script src="/admin/admin.js"></script>
</body>
</html>
