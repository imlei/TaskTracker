<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payroll Details — Payroll Works</title>
    <script>(function(){var t=localStorage.getItem('pw-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="/vendor/daisyui-themes.css" rel="stylesheet" />
    <link href="/vendor/daisyui-components.css" rel="stylesheet" />
    <script src="/vendor/tailwind-browser.js"></script>
    <style type="text/tailwindcss">@import "tailwindcss";</style>
  </head>
  <body class="bg-base-200 min-h-screen">

    <!-- Navbar -->
    <div class="navbar bg-base-100 border-b border-base-300 px-4 min-h-12 sticky top-0 z-30 shadow-sm">
      <div class="navbar-start gap-2">
        <a href="onboard-personal.html" class="btn btn-ghost btn-sm btn-circle" title="Back">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <span class="font-bold text-sm tracking-wide">PAYROLL WORKS</span>
        <span class="badge badge-ghost badge-sm">🇨🇦</span>
      </div>
      <div class="navbar-center">
        <span class="text-sm font-medium text-base-content/70">Add Team Member</span>
      </div>
      <div class="navbar-end gap-3">
        <button onclick="toggleTheme()" class="btn btn-ghost btn-sm btn-circle" title="Toggle dark mode">
          <svg id="iconSun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14A7 7 0 0012 5z"/></svg>
          <svg id="iconMoon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <div class="avatar placeholder">
          <div class="bg-primary text-primary-content rounded-full w-8 text-xs"><span>PW</span></div>
        </div>
      </div>
    </div>

    <!-- Wizard progress -->
    <div class="bg-base-100 border-b border-base-300 px-6 py-3">
      <ul class="steps steps-horizontal w-full max-w-lg mx-auto text-xs">
        <li class="step step-primary" data-content="✓">Member Type</li>
        <li class="step step-primary" data-content="✓">Personal Info</li>
        <li class="step step-primary" data-content="3">Payroll</li>
        <li class="step" data-content="4">YTD &amp; Benefits</li>
        <li class="step" data-content="5">Review</li>
      </ul>
    </div>

    <div class="flex justify-center px-4 py-8">
      <div class="w-full max-w-2xl flex flex-col gap-5">

        <!-- Pay details card -->
        <div class="card bg-base-100 shadow-sm">
          <div class="card-body gap-4">
            <h3 class="font-semibold text-base">Pay Details</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="form-control">
                <label class="label"><span class="label-text font-medium">Salary Type</span></label>
                <select id="salaryType" class="select select-bordered select-sm">
                  <option value="0">Salaried</option>
                  <option value="1" selected>Time-Based (Hourly)</option>
                </select>
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text font-medium">Pay Rate</span></label>
                <label class="input input-bordered input-sm flex items-center gap-1">
                  <span class="text-base-content/50 text-sm">$</span>
                  <input type="number" id="payRate" class="grow" step="0.01" min="0" placeholder="17.85" />
                </label>
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text font-medium">Rate Unit</span></label>
                <select id="payRateUnit" class="select select-bordered select-sm">
                  <option value="Hourly" selected>Hourly</option>
                  <option value="Annually">Annually</option>
                  <option value="Monthly">Monthly</option>
                </select>
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text font-medium">Pay Frequency</span></label>
                <select id="paysPerYear" class="select select-bordered select-sm">
                  <option value="52">Weekly (52×/year)</option>
                  <option value="26" selected>Bi-weekly (26×/year)</option>
                  <option value="24">Semi-monthly (24×/year)</option>
                  <option value="12">Monthly (12×/year)</option>
                </select>
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text font-medium">Hours / Week</span></label>
                <input type="number" id="hoursWeek" class="input input-bordered input-sm" step="0.5" min="0" max="80" placeholder="40" />
              </div>
            </div>
          </div>
        </div>

        <!-- Advanced Options card (collapsible) -->
        <div class="collapse collapse-arrow bg-base-100 shadow-sm rounded-xl border border-base-300">
          <input type="checkbox" id="advanced-toggle" />
          <label for="advanced-toggle" class="collapse-title font-semibold text-sm cursor-pointer">
            Advanced Options — TD1 tax credits &amp; exemptions
          </label>
          <div class="collapse-content">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
              <div class="form-control">
                <label class="label">
                  <span class="label-text font-medium">TD1 Federal</span>
                  <span class="label-text-alt text-xs text-base-content/50">Default $16,129</span>
                </label>
                <label class="input input-bordered input-sm flex items-center gap-1">
                  <span class="text-base-content/50 text-sm">$</span>
                  <input type="number" id="td1Federal" class="grow" step="1" min="0" placeholder="16129" />
                </label>
              </div>
              <div class="form-control">
                <label class="label">
                  <span class="label-text font-medium">TD1 Provincial</span>
                  <span class="label-text-alt text-xs text-base-content/50">Province-specific</span>
                </label>
                <label class="input input-bordered input-sm flex items-center gap-1">
                  <span class="text-base-content/50 text-sm">$</span>
                  <input type="number" id="td1Provincial" class="grow" step="1" min="0" placeholder="0" />
                </label>
              </div>
              <div class="form-control">
                <label class="label"><span class="label-text font-medium">Auto Vacation Pay</span></label>
                <label class="label cursor-pointer justify-start gap-3">
                  <input type="checkbox" id="autoVacation" class="checkbox checkbox-sm" checked />
                  <span class="label-text text-sm">Calculate vacation pay automatically each period</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Footer actions -->
        <div class="flex justify-between items-center bg-base-100 rounded-xl px-5 py-3 shadow-sm">
          <a href="onboard-personal.html" class="btn btn-ghost btn-sm">Back</a>
          <button type="button" id="btn-continue" class="btn btn-primary btn-sm gap-2">
            Continue
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
    </div>

    <script src="js/onboard.js"></script>
    <script>
      function toggleTheme() {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('pw-theme', next);
        document.getElementById('iconSun').classList.toggle('hidden', next !== 'dark');
        document.getElementById('iconMoon').classList.toggle('hidden', next === 'dark');
      }
      document.addEventListener('DOMContentLoaded', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.getElementById('iconSun').classList.toggle('hidden', !isDark);
        document.getElementById('iconMoon').classList.toggle('hidden', isDark);
      });

      (function() {
        var d = pwOnboard.load();
        if (d.salaryType !== undefined) document.getElementById('salaryType').value = String(d.salaryType);
        if (d.payRate)      document.getElementById('payRate').value     = d.payRate;
        if (d.payRateUnit)  document.getElementById('payRateUnit').value = d.payRateUnit;
        if (d.paysPerYear)  document.getElementById('paysPerYear').value = String(d.paysPerYear);
        if (d.hoursPerWeek) document.getElementById('hoursWeek').value   = d.hoursPerWeek;
        if (d.td1Federal)   document.getElementById('td1Federal').value  = d.td1Federal;
        if (d.td1Provincial) document.getElementById('td1Provincial').value = d.td1Provincial;
        if (typeof d.autoVacation === 'boolean') document.getElementById('autoVacation').checked = d.autoVacation;

        function freqLabel(v) {
          return { 52:'Weekly', 26:'Bi-weekly', 24:'Semi-Monthly', 12:'Monthly' }[v] || '';
        }

        document.getElementById('btn-continue').addEventListener('click', function() {
          var ppy = parseInt(document.getElementById('paysPerYear').value, 10) || 26;
          pwOnboard.save({
            salaryType:    parseInt(document.getElementById('salaryType').value, 10) || 1,
            payRate:       parseFloat(document.getElementById('payRate').value) || 0,
            payRateUnit:   document.getElementById('payRateUnit').value,
            paysPerYear:   ppy,
            payFrequency:  freqLabel(ppy),
            hoursPerWeek:  parseFloat(document.getElementById('hoursWeek').value) || 0,
            td1Federal:    parseFloat(document.getElementById('td1Federal').value) || 16129,
            td1Provincial: parseFloat(document.getElementById('td1Provincial').value) || 0,
            autoVacation:  document.getElementById('autoVacation').checked,
          });
          location.href = 'onboard-ytd.html';
        });
      })();
    </script>
  </body>
</html>
