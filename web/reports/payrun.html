<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pay run — SimpleTask Payroll</title>
    <script>(function(){var t=localStorage.getItem('pw-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();</script>
    <link href="/vendor/daisyui-themes.css" rel="stylesheet" />
    <link href="/vendor/daisyui-components.css" rel="stylesheet" />
    <script src="/vendor/tailwind-browser.js"></script>
    <style type="text/tailwindcss">@import "tailwindcss";</style>
  </head>
  <body class="bg-base-200 min-h-screen">

    <!-- Navbar -->
    <div class="navbar bg-base-100 border-b border-base-300 px-4 min-h-12 sticky top-0 z-30 shadow-sm">
      <div class="navbar-start gap-2">
        <a id="backBrand" href="../run-payroll.html" class="btn btn-ghost btn-sm text-base-content/60">←</a>
        <span class="font-bold text-sm tracking-wide">SimpleTask - Payroll</span>
        <span class="text-base">🇨🇦</span>
        <span class="badge badge-ghost badge-sm font-mono" id="taxYear">2025</span>
      </div>
      <div class="navbar-center">
        <a id="nav-run" href="../run-payroll.html" class="btn btn-ghost btn-sm font-medium">Payroll</a>
      </div>
      <div class="navbar-end gap-3">
        <span class="text-sm text-base-content/60" id="companyName">—</span>
        <button onclick="toggleTheme()" class="btn btn-ghost btn-sm btn-circle" title="Toggle dark mode">
          <svg id="iconSun" class="w-4 h-4 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 100 14A7 7 0 0012 5z"/></svg>
          <svg id="iconMoon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        </button>
        <div class="avatar avatar-placeholder">
          <div class="bg-primary text-primary-content rounded-full w-8 text-xs"><span>PW</span></div>
        </div>
      </div>
    </div>

    <div class="flex">
      <!-- Sidebar -->
      <aside class="w-56 bg-base-100 border-r border-base-300 min-h-[calc(100vh-3rem)] hidden md:flex flex-col gap-1 p-3 shrink-0">
        <a id="nav-home" href="../dashboard.html" class="btn btn-ghost btn-sm justify-start gap-2 font-normal">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Home
        </a>
        <a id="nav-runSide" href="../run-payroll.html" class="btn btn-ghost btn-sm justify-start gap-2 font-normal">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          Run Payroll
        </a>
        <!-- Reports sub-nav -->
        <div class="mt-1 flex flex-col">
          <div class="text-xs font-semibold uppercase tracking-wider text-base-content/40 px-2 py-1 mb-0.5">Reports</div>
          <a href="payrun.html" id="nav-payrun" class="btn btn-ghost btn-sm justify-start gap-2 font-normal w-full bg-primary/10 text-primary pl-5">Pay run</a>
          <a href="remittance.html" id="nav-remittance" class="btn btn-ghost btn-sm justify-start font-normal w-full pl-5">Remittance</a>
          <a href="cheques-payslips.html" id="nav-payslips" class="btn btn-ghost btn-sm justify-start font-normal w-full pl-5">Cheques / Payslips</a>
        </div>
        <a id="nav-employees" href="../employees.html" class="btn btn-ghost btn-sm justify-start gap-2 font-normal mt-1">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Employees
        </a>
      </aside>

      <!-- Main -->
      <main class="flex-1 p-4 md:p-6 min-w-0">
        <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
          <div>
            <h1 class="text-xl font-bold">Pay run</h1>
            <p class="text-sm text-base-content/60 mt-0.5">Payroll reports</p>
          </div>
          <div class="flex items-center gap-3">
            <div class="flex items-center gap-2">
              <label class="text-sm text-base-content/60">Tax year</label>
              <select id="y" class="select select-bordered select-xs w-24">
                <option value="2025">2025</option>
                <option value="2026">2026</option>
              </select>
            </div>
            <div class="flex items-center gap-2">
              <label class="text-sm text-base-content/60">Status</label>
              <select id="st" class="select select-bordered select-xs w-32">
                <option value="finalized" selected>Finalized</option>
                <option value="">All</option>
                <option value="calculated">Calculated</option>
                <option value="open">Open</option>
              </select>
            </div>
          </div>
        </div>

        <div id="alertBox" class="hidden alert alert-error text-sm py-2 px-4 mb-4"></div>

        <div class="card bg-base-100 shadow-sm">
          <div class="overflow-x-auto">
            <table class="table table-sm">
              <thead class="bg-base-200 text-xs uppercase tracking-wide text-base-content/60">
                <tr>
                  <th>Pay Period</th>
                  <th>Payment Date</th>
                  <th>Type</th>
                  <th>Status</th>
                  <th class="text-right">Employees</th>
                  <th class="text-right">Gross</th>
                  <th class="text-right">Net</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="runTbody">
                <tr><td colspan="8" class="text-center py-4 text-base-content/40">Loading…</td></tr>
              </tbody>
            </table>
          </div>
          <div class="px-4 py-2 border-t border-base-200 text-xs text-base-content/50" id="periodCount"></div>
        </div>
      </main>
    </div>

    <script>
      function toggleTheme() {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('pw-theme', next);
        document.getElementById('iconSun').classList.toggle('hidden', next !== 'dark');
        document.getElementById('iconMoon').classList.toggle('hidden', next === 'dark');
      }
      document.addEventListener('DOMContentLoaded', function() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.getElementById('iconSun').classList.toggle('hidden', !isDark);
        document.getElementById('iconMoon').classList.toggle('hidden', isDark);
      });

      var params    = new URLSearchParams(location.search);
      var companyId = params.get('company') || '';

      function withC(href) { return companyId ? href + '?company=' + encodeURIComponent(companyId) : href; }
      document.getElementById('nav-home').href      = companyId ? '../company.html?company=' + encodeURIComponent(companyId) : '../dashboard.html';
      document.getElementById('nav-run').href       = withC('../run-payroll.html');
      document.getElementById('nav-runSide').href   = withC('../run-payroll.html');
      document.getElementById('nav-employees').href = withC('../employees.html');
      document.getElementById('nav-remittance').href = 'remittance.html' + (companyId ? '?company=' + encodeURIComponent(companyId) : '');
      document.getElementById('nav-payslips').href   = 'cheques-payslips.html' + (companyId ? '?company=' + encodeURIComponent(companyId) : '');
      document.getElementById('nav-payrun').href     = 'payrun.html' + (companyId ? '?company=' + encodeURIComponent(companyId) : '');

      if (companyId) {
        fetch('/api/payroll/companies/' + encodeURIComponent(companyId), { credentials: 'same-origin' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (c) { if (c) document.getElementById('companyName').textContent = c.name || c.legalName; });
      }

      var allPeriods = [];

      function load() {
        if (!companyId) {
          document.getElementById('runTbody').innerHTML =
            '<tr><td colspan="8" class="text-center py-4 text-base-content/40">No company selected.</td></tr>';
          return;
        }
        fetch('/api/payroll/periods?company_id=' + encodeURIComponent(companyId), { credentials: 'same-origin' })
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (list) { allPeriods = list || []; render(); });
      }

      var summaryCache = {};
      function loadSummary(periodId, cb) {
        if (summaryCache[periodId]) { cb(summaryCache[periodId]); return; }
        fetch('/api/payroll/report/period-summary?period_id=' + encodeURIComponent(periodId), { credentials: 'same-origin' })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (sm) { if (sm) summaryCache[periodId] = sm; cb(sm); });
      }

      function render() {
        var yearFilter   = document.getElementById('y').value;
        var statusFilter = document.getElementById('st').value;

        var filtered = allPeriods.filter(function (p) {
          if (yearFilter   && p.payDate && p.payDate.slice(0,4) !== yearFilter) return false;
          if (statusFilter && p.status !== statusFilter) return false;
          return true;
        });

        document.getElementById('periodCount').textContent =
          filtered.length + ' pay run' + (filtered.length !== 1 ? 's' : '');

        if (!filtered.length) {
          document.getElementById('runTbody').innerHTML =
            '<tr><td colspan="8" class="text-center py-4 text-base-content/40">No pay runs found.</td></tr>';
          return;
        }

        document.getElementById('runTbody').innerHTML = filtered.map(function (p) {
          var statusBadge = p.status === 'finalized'
            ? '<span class="badge badge-success badge-xs">finalized</span>'
            : p.status === 'calculated'
            ? '<span class="badge badge-info badge-xs">calculated</span>'
            : p.status === 'open'
            ? '<span class="badge badge-warning badge-xs">open</span>'
            : '<span class="badge badge-ghost badge-xs">' + (p.status || 'draft') + '</span>';
          var openHref     = '../salaries.html?period=' + encodeURIComponent(p.id) + (companyId ? '&company=' + encodeURIComponent(companyId) : '');
          var summaryHref  = '../summary.html?period='  + encodeURIComponent(p.id) + (companyId ? '&company=' + encodeURIComponent(companyId) : '');
          var payslipsHref = 'cheques-payslips.html?period=' + encodeURIComponent(p.id) + (companyId ? '&company=' + encodeURIComponent(companyId) : '');
          var actionHref   = p.status === 'finalized' ? summaryHref : openHref;
          var actionTitle  = p.status === 'finalized' ? 'View summary' : 'Continue';
          return '<tr class="hover" id="row-' + p.id + '">' +
            '<td class="font-mono text-xs">' + (p.periodStart || '—') + ' – ' + (p.periodEnd || '—') + '</td>' +
            '<td class="font-mono text-xs">' + (p.payDate || '—') + '</td>' +
            '<td class="text-sm">' + (p.payrollType || 'regular') + '</td>' +
            '<td>' + statusBadge + '</td>' +
            '<td class="text-right font-mono text-xs" id="cnt-'   + p.id + '">—</td>' +
            '<td class="text-right font-mono text-xs" id="gross-' + p.id + '">—</td>' +
            '<td class="text-right font-mono text-xs" id="net-'   + p.id + '">—</td>' +
            '<td class="text-right">' +
              (p.status === 'finalized' ? '<a href="' + payslipsHref + '" class="btn btn-xs btn-ghost" title="Payslips">📄</a>' : '') +
              '<a href="' + actionHref + '" class="btn btn-xs btn-ghost" title="' + actionTitle + '">🔍</a>' +
              (p.status === 'finalized' ? '<a href="/api/payroll/export/csv?period_id=' + encodeURIComponent(p.id) + '" class="btn btn-xs btn-ghost" title="CSV" download>⬇</a>' : '') +
            '</td>' +
            '</tr>';
        }).join('');

        filtered.forEach(function (p) {
          if (p.status === 'open') return;
          loadSummary(p.id, function (sm) {
            if (!sm) return;
            var cntEl   = document.getElementById('cnt-'   + p.id);
            var grossEl = document.getElementById('gross-' + p.id);
            var netEl   = document.getElementById('net-'   + p.id);
            if (cntEl)   cntEl.textContent   = sm.employeeCount;
            if (grossEl) grossEl.textContent = '$' + sm.totalGross.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
            if (netEl)   netEl.textContent   = '$' + sm.totalNet.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
          });
        });
      }

      document.getElementById('y').addEventListener('change', render);
      document.getElementById('st').addEventListener('change', render);

      document.getElementById('y').value = new Date().getFullYear().toString();
      document.getElementById('taxYear').textContent = new Date().getFullYear();

      load();
    </script>
  </body>
</html>
