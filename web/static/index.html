<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TaskTracker</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <h1>TaskTracker</h1>
      <button type="button" id="btn-logout" class="ghost" hidden>退出登录</button>
    </div>
    <nav class="tabs">
      <button type="button" class="tab active" data-tab="tasks">任务 Task</button>
      <button type="button" class="tab" data-tab="prices">价目表 Price list</button>
      <button type="button" class="tab" data-tab="report">报表 Report</button>
      <button type="button" class="tab" data-tab="invoices">Invoices</button>
    </nav>
  </header>

  <main>
    <section id="panel-tasks" class="panel active">
      <div class="toolbar">
        <label>状态筛选
          <select id="filter-status">
            <option value="">全部</option>
            <option value="Pending">Pending</option>
            <option value="Done">Done</option>
            <option value="Sent">Sent</option>
            <option value="Paid">Paid</option>
          </select>
        </label>
        <button type="button" id="btn-new-task" class="primary">新建任务</button>
      </div>
      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>No.</th>
              <th>公司名</th>
              <th>日期</th>
              <th>业务一</th>
              <th>价格一</th>
              <th>状态</th>
              <th>完成日期</th>
              <th>备注</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tasks-body"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-report" class="panel">
      <div class="toolbar report-toolbar">
        <label>完成月份
          <input type="month" id="report-month" />
        </label>
        <button type="button" id="btn-report-load" class="primary">查询</button>
        <button type="button" id="btn-report-export" class="ghost">导出 CSV</button>
      </div>
      <p class="report-summary" id="report-summary">请选择月份并查询。</p>
      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>No.</th>
              <th>公司名</th>
              <th>日期</th>
              <th>业务一</th>
              <th>价格一</th>
              <th>完成日期</th>
              <th>备注</th>
            </tr>
          </thead>
          <tbody id="report-body"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-prices" class="panel">
      <div class="toolbar">
        <button type="button" id="btn-new-price" class="primary">新建价目</button>
      </div>
      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>编号</th>
              <th>服务项目</th>
              <th>金额</th>
              <th>货币</th>
              <th>说明</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="prices-body"></tbody>
        </table>
      </div>
    </section>

    <section id="panel-invoices" class="panel">
      <div class="toolbar report-toolbar">
        <label>状态
          <select id="invoice-filter">
            <option value="">全部</option>
            <option value="Draft">Draft</option>
            <option value="Sent">Sent</option>
            <option value="Paid">Paid</option>
          </select>
        </label>
        <button type="button" id="btn-invoices-load" class="primary">刷新</button>
      </div>
      <p class="report-summary" id="invoices-summary">已发送/已收款发票列表。</p>
      <div class="table-wrap">
        <table class="data">
          <thead>
            <tr>
              <th>Invoice</th>
              <th>Task</th>
              <th>Bill To</th>
              <th>日期</th>
              <th>到期</th>
              <th>状态</th>
              <th>总额</th>
              <th>已收</th>
              <th>未收</th>
              <th>发送时间</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="invoices-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <dialog id="dlg-task" class="dlg-task-wide">
    <form method="dialog" id="form-task">
      <h2 id="dlg-task-title">任务</h2>
      <input type="hidden" id="task-id" />
      <label>No. <input id="task-no" readonly placeholder="保存后自动生成" /></label>
      <label>公司名 <input id="task-company" required /></label>
      <label>日期 <input id="task-date" type="date" /></label>
      <div class="price-pick-block">
        <div class="price-pick-head">
          <span>从价目表选择（可多选）</span>
          <button type="button" class="ghost small" id="task-price-clear" title="清空勾选">清空勾选</button>
        </div>
        <p class="hint">勾选后会自动填入「业务一」「价格一」；多种货币时，第一币种写入价格一，其余在下方说明。</p>
        <div id="task-price-picks" class="price-pick-list" role="group" aria-label="价目表多选"></div>
        <div id="task-price-preview" class="price-preview" hidden></div>
      </div>
      <label>业务一 <input id="task-s1" /></label>
      <label>价格一 <input id="task-p1" type="number" step="0.01" min="0" /></label>
      <input type="hidden" id="task-status" value="Pending" />
      <label>备注 <input id="task-note" /></label>
      <div class="dlg-actions">
        <button type="submit" class="primary">保存</button>
        <button type="button" id="task-cancel">取消</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlg-price">
    <form method="dialog" id="form-price">
      <h2 id="dlg-price-title">价目</h2>
      <input type="hidden" id="price-id" />
      <label>服务项目 <input id="price-name" required /></label>
      <label>金额（空表示面议/未定价） <input id="price-amount" type="number" step="0.01" min="0" /></label>
      <label>货币
        <select id="price-currency">
          <option value="CNY">CNY（元）</option>
          <option value="CAD">CAD（加币）</option>
          <option value="USD">USD（刀）</option>
        </select>
      </label>
      <label>说明 <input id="price-note" placeholder="如：起" /></label>
      <div class="dlg-actions">
        <button type="submit" class="primary">保存</button>
        <button type="button" id="price-cancel">取消</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlg-invoice" class="dlg-task-wide">
    <form method="dialog" id="form-invoice">
      <h2>生成 Invoice</h2>
      <input type="hidden" id="inv-task-id" />
      <label>Bill To 名称 <input id="inv-bill-name" required /></label>
      <label>Bill To 地址 <input id="inv-bill-addr" /></label>
      <label>Bill To Email（发送用） <input id="inv-bill-email" type="email" placeholder="name@example.com" /></label>
      <label>Ship To 名称 <input id="inv-ship-name" /></label>
      <label>Ship To 地址 <input id="inv-ship-addr" /></label>
      <label>Invoice Date <input id="inv-date" type="date" /></label>
      <label>Terms <input id="inv-terms" value="Net 30" /></label>
      <label>Due Date <input id="inv-due-date" type="date" /></label>
      <label>Currency
        <select id="inv-currency">
          <option value="USD">USD</option>
          <option value="CAD">CAD</option>
          <option value="CNY">CNY</option>
        </select>
      </label>
      <label>Tax Rate(%) <input id="inv-tax-rate" type="number" step="0.01" min="0" value="0" /></label>
      <label>Description <input id="inv-desc" value="Consulting Services" /></label>
      <label>Detail <textarea id="inv-detail" rows="4"></textarea></label>
      <label>Qty <input id="inv-qty" type="number" step="0.01" min="0.01" value="1" /></label>
      <label>Rate <input id="inv-rate" type="number" step="0.01" min="0" value="0" /></label>
      <div class="dlg-actions">
        <button type="submit" class="primary">生成并打开</button>
        <button type="button" id="invoice-cancel">取消</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlg-pay" class="dlg-task-wide">
    <form method="dialog" id="form-pay">
      <h2>登记收款</h2>
      <input type="hidden" id="pay-invoice-id" />
      <label>收款日期 <input id="pay-date" type="date" /></label>
      <label>收款金额 <input id="pay-amount" type="number" step="0.01" min="0.01" /></label>
      <div class="dlg-actions">
        <button type="submit" class="primary">保存</button>
        <button type="button" id="pay-cancel">取消</button>
      </div>
    </form>
  </dialog>

  <script src="/app.js"></script>
</body>
</html>
