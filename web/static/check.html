<!DOCTYPE html>
<html lang="en-CA">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Print cheque</title>
  <style>
    @font-face {
      font-family: "MicrE13B";
      src: local("GnuMICR"), local("E13B"), local("MICR"),
        url("/fonts/micr-e13b.woff2") format("woff2"),
        url("/fonts/micr-e13b.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Segoe UI", system-ui, sans-serif; background: #e8ecf1; color: #0f172a; }
    .toolbar {
      max-width: 920px;
      margin: 12px auto;
      padding: 0 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .toolbar button {
      padding: 8px 14px;
      border: 1px solid #64748b;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
    }
    .toolbar .primary { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }
    .form-panel {
      max-width: 920px;
      margin: 0 auto 16px;
      padding: 16px 20px;
      background: #fff;
      border-radius: 8px;
      border: 1px solid #cbd5e1;
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .form-panel h2 { margin: 0 0 12px; font-size: 1rem; color: #334155; }
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px 16px;
    }
    .form-grid label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: #475569; }
    .form-grid input { padding: 8px 10px; border: 1px solid #94a3b8; border-radius: 6px; font-size: 14px; }
    .form-panel .hint { margin: 12px 0 0; font-size: 12px; color: #64748b; }
    .check-wrap { max-width: 920px; margin: 0 auto; padding: 0 16px 24px; }
    .check-slip {
      width: 100%;
      max-width: 8.5in;
      margin: 0 auto;
      min-height: 3.25in;
      padding: 0.35in 0.45in 0.4in;
      background: #fff;
      border: 2px solid #0f172a;
      border-radius: 4px;
    }
    .check-slip .chk-date {
      text-align: right;
      font-size: 13px;
      margin-bottom: 0.2in;
    }
    .check-slip .chk-date span { border-bottom: 1px solid #0f172a; min-width: 2.2in; display: inline-block; padding: 0 4px 2px; }
    .check-slip .chk-label { font-size: 11px; color: #334155; text-transform: uppercase; letter-spacing: 0.04em; }
    .check-slip .pay-line {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      margin-bottom: 0.14in;
      font-size: 15px;
    }
    .check-slip .pay-line .line { flex: 1; border-bottom: 1px solid #0f172a; min-height: 1.35em; padding: 0 4px 2px; word-break: break-word; }
    .check-slip .words-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      margin-bottom: 0.18in;
    }
    .check-slip .words-box {
      flex: 1;
      border: 1px solid #0f172a;
      min-height: 2.2em;
      padding: 6px 8px;
      font-size: 12px;
      line-height: 1.35;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .check-slip .amount-box {
      border: 2px solid #0f172a;
      padding: 4px 10px;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      min-width: 1.4in;
      text-align: right;
    }
    .check-slip .memo-sig {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      margin-top: 0.12in;
      font-size: 13px;
    }
    .check-slip .memo-line { flex: 1; border-bottom: 1px solid #0f172a; min-height: 1.3em; padding: 0 4px 2px; }
    .check-slip .sig-box { width: 42%; border-bottom: 1px solid #0f172a; min-height: 2em; }
    .check-slip .sig-label { font-size: 10px; color: #475569; margin-top: 2px; text-align: center; }
    .check-slip .micr-zone {
      margin-top: 0.28in;
      padding-top: 0.1in;
      border-top: 1px dashed #94a3b8;
    }
    .check-slip .micr-line {
      font-family: "MicrE13B", "Courier New", Courier, monospace;
      font-size: 12pt;
      letter-spacing: 0.03em;
      text-align: center;
      white-space: nowrap;
      overflow-x: auto;
      min-height: 1.35em;
      line-height: 1.35;
    }
    @media print {
      body { background: #fff; }
      .no-print { display: none !important; }
      .check-wrap { padding: 0; max-width: none; }
      .check-slip {
        border: none;
        border-radius: 0;
        max-width: none;
        page-break-inside: avoid;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar no-print">
    <button type="button" id="btn-back">返回系统</button>
    <button type="button" id="btn-cheque-next">将支票号 +1 写回设置</button>
    <button type="button" class="primary" id="btn-print">打印 / 导出 PDF</button>
  </div>
  <div class="form-panel no-print">
    <h2>打印前可修改（仅屏幕显示，打印区域见下方）</h2>
    <div class="form-grid">
      <label>Date <input type="date" id="fld-date" /></label>
      <label>Pay to the order of <input type="text" id="fld-payee" autocomplete="organization" /></label>
      <label>Amount <input type="number" id="fld-amount" step="0.01" min="0" /></label>
      <label>Currency <input type="text" id="fld-currency" maxlength="8" /></label>
      <label>Cheque #（MICR） <input type="text" id="fld-cheque" maxlength="24" autocomplete="off" /></label>
      <label style="grid-column: 1 / -1;">Memo <input type="text" id="fld-memo" /></label>
    </div>
    <p class="hint" id="check-micr-banner"></p>
    <p class="hint" id="micr-hint" hidden>未生成 MICR 行：请到 <a href="/settings.html">Settings</a> 选择<strong>美国</strong>或<strong>加拿大</strong>格式并填写账户，或使用「MICR 完全覆盖」。</p>
    <p class="hint">金额大写为英文。无发票打开时默认币种在 <a href="/settings.html">Settings</a>「支票金额币种」中设置（可与加拿大/美国 MICR 格式独立，例如加行 + USD）。<code>?id=</code>、<code>?amount=</code> 见上。</p>
  </div>
  <div class="check-wrap">
    <article class="check-slip" id="check-slip" aria-label="Cheque slip">
      <div class="chk-date"><span class="chk-label">Date&nbsp;</span><span id="out-date"></span></div>
      <div class="pay-line">
        <span class="chk-label" style="white-space:nowrap;">Pay to the<br />order of</span>
        <div class="line" id="out-payee"></div>
      </div>
      <div class="words-row">
        <div class="words-box" id="out-words"></div>
        <div class="amount-box" id="out-amount"></div>
      </div>
      <div class="memo-sig">
        <div>
          <span class="chk-label">Memo</span>
          <div class="memo-line" id="out-memo"></div>
        </div>
        <div style="flex: 0 0 42%;">
          <div class="sig-box"></div>
          <div class="sig-label">Signature</div>
        </div>
      </div>
      <div class="micr-zone">
        <div class="chk-label">MICR / E13B encoding line</div>
        <div class="micr-line" id="out-micr"></div>
      </div>
    </article>
  </div>
  <script src="/check.js"></script>
</body>
</html>
