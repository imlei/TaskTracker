<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Review — Payroll Works</title>
    <link rel="stylesheet" href="employees-theme.css" />
  </head>
  <body class="pe-app">
    <div class="pe-shell">
      <header class="pe-topbar">
        <div class="pe-brand">
          <span>PAYROLL WORKS</span>
          <span class="sep">|</span>
          <span class="sub">Payroll</span>
          <span class="pe-flag">🇨🇦</span>
          <span class="pe-tax-pill">2026</span>
        </div>
        <nav class="pe-topbar-nav">
          <a href="run-payroll.html" class="pe-topbar-nav-item">Payroll</a>
        </nav>
        <div class="pe-topbar-right">
          <span class="pe-badge-admin">Admin</span>
          <span>RORO HOLDING LTD</span>
          <button type="button" class="pe-icon-btn">📞</button>
          <button type="button" class="pe-icon-btn">🔔</button>
          <button type="button" class="pe-icon-btn">?</button>
          <div class="pe-avatar">LH</div>
        </div>
      </header>

      <div class="pe-wizard-bar">
        <div class="pe-wizard-steps">
          <div class="pe-wstep done"><span class="circle">✓</span><span>Employee</span></div>
          <div class="pe-wstep done"><span class="circle">✓</span><span>Payroll</span></div>
          <div class="pe-wstep active"><span class="circle">📋</span><span>Checklist</span></div>
        </div>
        <div class="pe-wizard-sub">
          <span></span>
          <div class="pe-progress"><i style="width: 100%"></i></div>
          <span>Onboard employee</span>
        </div>
      </div>

      <aside class="pe-sidebar">
        <a class="pe-nav" href="dashboard.html"><span>⌂</span> Home</a>
        <a class="pe-nav" href="run-payroll.html"><span>▤</span> Run payroll</a>
        <a class="pe-nav" href="#"><span>☰</span> Actions</a>
        <a class="pe-nav" href="reports/payrun.html"><span>▦</span> Reports</a>
        <a class="pe-nav active" href="employees.html"><span>👤</span> Employees</a>
        <span class="pe-nav spacer"></span>
        <a class="pe-nav" href="#"><span>⚙</span> Settings</a>
      </aside>

      <main class="pe-main">
        <div class="pe-card">
          <h2>Review / checklist</h2>
          <div class="pe-checklist-row">
            <div class="big-icon">✓</div>
            <div>
              <strong>Employee on-boarding</strong>
              <div style="font-size: 0.88rem; color: var(--pe-text-secondary); margin-top: 0.25rem">
                <span id="review-name">—</span> · <span id="review-id">(assigned on save)</span>
              </div>
            </div>
          </div>
          <div class="pe-checklist-row pending">
            <div class="big-icon">✉</div>
            <div>
              <strong>Invite to on-board</strong>
              <div style="font-size: 0.88rem; color: var(--pe-text-secondary); margin-top: 0.25rem" id="review-email">
                —
              </div>
            </div>
          </div>
          <div class="pe-foot-actions">
            <a class="pe-btn" href="onboard-vacation.html">Back</a>
            <button type="button" class="pe-btn pe-btn-primary" id="btn-finish">Continue</button>
          </div>
        </div>
      </main>
    </div>
    <script src="js/onboard.js"></script>
    <script>
      (function () {
        var d = pwOnboard.load();
        if (d.legalName) document.getElementById("review-name").textContent = d.legalName;
        var em = [d.email, d.mobile].filter(Boolean).join(" · ");
        if (em) document.getElementById("review-email").textContent = em;

        function iso(d) {
          if (!d) return null;
          return new Date(d + "T00:00:00Z").toISOString();
        }

        document.getElementById("btn-finish").addEventListener("click", function () {
          var mt = typeof d.memberType === "number" ? d.memberType : 0;
          var st = typeof d.salaryType === "number" && !isNaN(d.salaryType) ? d.salaryType : 1;
          var body = {
            legalName: d.legalName || "",
            nickname: d.nickname || "",
            email: d.email || "",
            mobile: d.mobile || "",
            memberType: mt,
            position: "",
            payFrequency: d.payFrequency || "",
            status: "active",
            category: 0,
            salaryType: st,
            province: typeof d.province === "number" ? d.province : 1,
            payRate: d.payRate || 0,
            payRateUnit: d.payRateUnit || "",
            paysPerYear: d.paysPerYear || 0,
            hoursPerWeek: d.hoursPerWeek || 0,
            sin: d.sin || "",
            hireDate: iso(d.hireDate) || new Date().toISOString(),
          };
          if (d.dob) body.dateOfBirth = iso(d.dob);
          if (typeof d.paidYTDThroughOtherPayroll === "boolean")
            body.paidYTDThroughOtherPayroll = d.paidYTDThroughOtherPayroll;
          if (typeof d.autoVacation === "boolean") body.autoVacation = d.autoVacation;

          fetch("/api/employees", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body),
          })
            .then(function (r) {
              if (!r.ok) return r.text().then(function (t) {
                throw new Error(t || r.statusText);
              });
              return r.json();
            })
            .then(function (emp) {
              pwOnboard.clear();
              alert("Employee saved · ID " + emp.id);
              location.href = "employees.html";
            })
            .catch(function (err) {
              alert("Could not save (run payroll-web from repo root): " + err.message);
            });
        });
      })();
    </script>
  </body>
</html>
